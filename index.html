<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Den Visuelle Mattemaskinen - Interaktiv</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Den Visuelle Mattemaskinen</h1>
        <p>Dra objektene for å løse oppgaven selv!</p>
    </header>

    <main>
        <section id="controls">
            <div class="input-group">
                <label for="input-a">Hvor mange totalt?</label>
                <input type="number" id="input-a" value="12" min="1" max="30">
            </div>

            <div class="input-group">
                <label for="input-b">Del på (antall esker):</label>
                <input type="number" id="input-b" value="3" min="1" max="6">
            </div>

            <button id="btn-setup">Klargjør Oppgave</button>
            <button id="btn-reset">Nullstill</button>
        </section>

        <div id="learning-grid">
            <section id="visualization-area">
                <div id="source-zone">
                    <h3>Haug med objekter</h3>
                    <div id="source-container"></div>
                </div>
                
                <div id="target-zone">
                    <h3>Fordel her</h3>
                    <div id="target-containers"></div>
                </div>
            </section>

            <section id="math-board">
                <h3>Regnestykket</h3>
                <div id="algorithm-display">
                    <div class="equation-line">
                        <span id="display-a">0</span> : <span id="display-b">0</span> = <span id="display-result">?</span>
                    </div>
                    <div id="work-steps">
                        </div>
                </div>
            </section>
        </div>

        <section id="status-display">
            <p id="instruction-text">Klikk "Klargjør Oppgave" for å begynne.</p>
        </section>

        <section id="gui-log-container">
            <h3>Hendelseslogg (System):</h3>
            <div id="gui-log"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
